<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 半透明填充（闭合后淡入） -->
  <polygon 
    points="256,50 460,198 382,432 130,432 52,198"
    fill="rgba(234,88,12,0.15)" stroke="none" opacity="0">
    <animate attributeName="opacity" from="0" to="1" 
      begin="1.6s" dur="0.3s" fill="freeze"/>
  </polygon>

  <!-- 描边逐步绘制 -->
  <polygon 
    points="256,50 460,198 382,432 130,432 52,198"
    fill="none" stroke="#ea580c" stroke-width="24" 
    stroke-linejoin="round" stroke-linecap="round"
    stroke-dasharray="1250" stroke-dashoffset="1250">
    <animate attributeName="stroke-dashoffset" from="1250" to="0" 
      dur="1.6s" fill="freeze" calcMode="linear"/>
  </polygon>

  <!-- 5个节点依次出现 -->
  <circle cx="256" cy="50" r="30" fill="#ea580c" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0s" dur="0.12s" fill="freeze"/>
  </circle>
  <circle cx="460" cy="198" r="30" fill="#ea580c" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.32s" dur="0.12s" fill="freeze"/>
  </circle>
  <circle cx="382" cy="432" r="30" fill="#ea580c" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.64s" dur="0.12s" fill="freeze"/>
  </circle>
  <circle cx="130" cy="432" r="30" fill="#ea580c" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.96s" dur="0.12s" fill="freeze"/>
  </circle>
  <circle cx="52" cy="198" r="30" fill="#ea580c" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.28s" dur="0.12s" fill="freeze"/>
  </circle>

  <!-- 画笔光点：与描边同步 -->
  <circle r="16" fill="#ea580c" opacity="0.85" filter="url(#glow)">
    <animateMotion 
      path="M256,50 L460,198 L382,432 L130,432 L52,198 L256,50" 
      dur="1.6s" fill="freeze" calcMode="linear"/>
    <animate attributeName="opacity" values="0;0.85;0.85;0" 
      keyTimes="0;0.02;0.9;1" dur="1.6s" fill="freeze"/>
    <animate attributeName="r" values="16;16;0" 
      keyTimes="0;0.9;1" dur="1.6s" fill="freeze"/>
  </circle>
</svg>
