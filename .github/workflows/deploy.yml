name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build
        # 支持两种 Secret 命名（向后兼容）：
        #   1. TIANDITU_API_KEYS  — 多个 key 英文逗号分隔（推荐，配合运行时自动轮换降级）
        #   2. TIANDITU_KEY       — 单个 key（兼容旧配置，会被映射到 VITE_TIANDITU_API_KEY）
        # 同时也兼容环境变量名 VITE_TIANDITU_API_KEYS / VITE_TIANDITU_API_KEY
        env:
          VITE_TIANDITU_API_KEYS: ${{ secrets.TIANDITU_API_KEYS || secrets.TIANDITU_KEY }}
          VITE_TIANDITU_API_KEY: ${{ secrets.TIANDITU_KEY }}
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4